<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محلل حسابات X</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; text-align: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background-color: #1DA1F2; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .result { margin-top: 20px; padding: 15px; border-top: 1px solid #eee; text-align: right; }
        .error { color: red; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>تحليل حساب إكس (X)</h2>
        <form action="/check" method="post">
            <input type="text" name="user_id" placeholder="أدخل اسم المستخدم (بدون @)" required>
            <button type="submit">فحص الحساب</button>
        </form>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        {% if data %}
            <div class="result">
                <p><strong>الاسم:</strong> {{ data.name }}</p>
                <p><strong>المتابعين:</strong> {{ data.followers }}</p>
                <p><strong>يتابع:</strong> {{ data.following }}</p>
                <p><strong>الوصف:</strong> {{ data.bio }}</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
